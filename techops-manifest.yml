# ==========================================
# 1. CONFIGURATION & SECRETS
# ==========================================
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
type: Opaque
data:
  mysql-root-password: MTIzNA== # 'password' in base64
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: techops-manager-app
---
# ==========================================
# 2. DATABASE LAYER (StatefulSet)
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
spec:
  type: ClusterIP    # Change from None to ClusterIP (or just remove clusterIP: None)
  ports:
  - port: 3306
    targetPort: 3306
  selector:
    app: mysql
---
# ==========================================
# 2. DATABASE LAYER (StatefulSet)
# ==========================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: techops  # Ensure this matches your other resources
spec:
  serviceName: "mysql-service"
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-root-password
        # --- ADD THE NEW VARIABLE HERE ---
        - name: MYSQL_DATABASE
          value: "techops-manager"
        # ---------------------------------
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi
---
# ==========================================
# 3. APPLICATION LAYER (Deployment)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: techops-manager-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: techops-manager-app
  template:
    metadata:
      labels:
        app: techops-manager-app
    spec:
      containers:
      - name: techops-manager-app
        image: avisubir/techops-manager-app:v1.0
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          # Use the full internal path so there is no confusion
          value: "mysql-service.techops.svc.cluster.local"
        - name: DB_USER
          value: "root"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-root-password
        - name: DB_NAME
          value: "techops-manager"
        
---
apiVersion: v1
kind: Service
metadata:
  name: techops-manager-app-service
spec:
  selector:
    app: techops-manager-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
# ==========================================
# 4. OBSERVABILITY (Prometheus, Grafana, Node Exporter)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus/"]
        ports: [{containerPort: 9090}]
        volumeMounts:
        - {name: config-volume, mountPath: /etc/prometheus/}
        - {name: storage-volume, mountPath: /prometheus/}
      volumes:
      - {name: config-volume, configMap: {name: prometheus-config}}
      - {name: storage-volume, emptyDir: {}}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
spec:
  selector: {app: prometheus}
  ports: [{port: 9090}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector: {matchLabels: {app: grafana}}
  template:
    metadata:
      labels: {app: grafana}
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports: [{containerPort: 3000}]
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
spec:
  selector: {app: grafana}
  ports: [{port: 80, targetPort: 3000}]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
spec:
  selector: {matchLabels: {app: node-exporter}}
  template:
    metadata:
      labels: {app: node-exporter}
    spec:
      hostNetwork: true
      hostPID: true
      containers:
      - name: node-exporter
        image: prom/node-exporter:latest
        ports: [{containerPort: 9100, hostPort: 9100}]
        args:
        - --path.procfs=/host/proc
        - --path.sysfs=/host/sys
        - --collector.filesystem.ignored-mount-points
        - ^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)
        volumeMounts:
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true
        - name: root
          mountPath: /rootfs
          readOnly: true
      volumes:
      - name: proc
        hostPath: {path: /proc}
      - name: sys
        hostPath: {path: /sys}
      - name: root
        hostPath: {path: /}
---
# ==========================================
# 5. NETWORKING (Ingress)
# ==========================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: techops-manager-app.local # Replace with your local host or domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: techops-manager-app-service
            port:
              number: 80
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: grafana-service
            port:
              number: 80
